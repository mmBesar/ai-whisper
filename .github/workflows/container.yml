name: Build Container Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            qemu: false

          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            qemu: false

          - arch: riscv64
            runner: ubuntu-24.04
            platform: linux/riscv64
            qemu: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/mmbesar/ai-whisper:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            TARGETARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}

  # Merge always runs after builds — not just on tags
  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-image
    runs-on: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="ghcr.io/mmbesar/ai-whisper"
          docker buildx imagetools create \
            --tag "${BASE}:${VERSION}" \
            --tag "${BASE}:latest" \
            "${BASE}:${VERSION}-amd64" \
            "${BASE}:${VERSION}-arm64" \
            "${BASE}:${VERSION}-riscv64"

      - name: Inspect manifest
        run: docker buildx imagetools inspect ghcr.io/mmbesar/ai-whisper:latest
